<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Digit Recognizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #fff;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0, 150, 255, 0.3);
        }

        .header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .canvas-wrapper {
            position: relative;
            margin-bottom: 25px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        #canvas {
            display: block;
            width: 100%;
            background: #fff;
            border-radius: 20px;
            cursor: crosshair;
            touch-action: none;
        }

        .canvas-border {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 20px;
            pointer-events: none;
            border: 3px solid transparent;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf, #ff006e) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .canvas-wrapper:hover .canvas-border {
            opacity: 1;
        }

        .button-row {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 15px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: #fff;
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .result-digit {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #ff006e, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 10px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .result-confidence {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
        }

        .result-confidence span {
            color: #00d4ff;
            font-weight: 600;
        }

        .probability-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 20px;
        }

        .prob-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 10px 5px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .prob-item.active {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(123, 44, 191, 0.3));
            transform: scale(1.1);
        }

        .prob-digit {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .prob-value {
            color: #fff;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 5px;
        }

        .loading {
            display: none;
            color: #00d4ff;
            font-size: 1rem;
            margin-top: 15px;
        }

        .loading.active {
            display: block;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>🔢 Digit Recognizer</h1>
            <p>Draw a number (0-9) and let AI identify it</p>
        </div>

        <div class="canvas-wrapper">
            <canvas id="canvas" width="280" height="280"></canvas>
            <div class="canvas-border"></div>
        </div>

        <div class="button-row">
            <button class="btn btn-primary" onclick="predictDigit()">Recognize</button>
            <button class="btn btn-secondary" onclick="clearCanvas()">Clear</button>
        </div>

        <div class="result-card">
            <div class="result-label">Predicted Digit</div>
            <div class="result-digit" id="resultDigit">
                <span class="placeholder">?</span>
            </div>
            <div class="result-confidence" id="resultConfidence" style="display: none;">
                Confidence: <span id="confidenceValue">0%</span>
            </div>
            <div class="loading" id="loading">Analyzing...</div>
            <div class="probability-grid" id="probabilityGrid"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        // Initialize canvas
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 15;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            if (e.touches) {
                return {
                    x: (e.touches[0].clientX - rect.left) * scaleX,
                    y: (e.touches[0].clientY - rect.top) * scaleY
                };
            }
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        function startDrawing(e) {
            e.preventDefault();
            isDrawing = true;
            const pos = getPos(e);
            lastX = pos.x;
            lastY = pos.y;
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            lastX = pos.x;
            lastY = pos.y;
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // Mouse events
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // Touch events
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        function clearCanvas() {
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            document.getElementById('resultDigit').innerHTML = '<span class="placeholder">?</span>';
            document.getElementById('resultConfidence').style.display = 'none';
            document.getElementById('loading').classList.remove('active');
            document.getElementById('probabilityGrid').innerHTML = '';
        }

        async function predictDigit() {
            const loading = document.getElementById('loading');
            const resultDigit = document.getElementById('resultDigit');
            const resultConfidence = document.getElementById('resultConfidence');
            const confidenceValue = document.getElementById('confidenceValue');
            const probabilityGrid = document.getElementById('probabilityGrid');

            loading.classList.add('active');
            resultDigit.innerHTML = '<span class="placeholder">?</span>';
            resultConfidence.style.display = 'none';
            probabilityGrid.innerHTML = '';

            // Create white canvas for processing (invert colors)
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 28;
            tempCanvas.height = 28;
            const tempCtx = tempCanvas.getContext('2d');
            
            // Draw scaled version
            tempCtx.fillStyle = '#fff';
            tempCtx.fillRect(0, 0, 28, 28);
            tempCtx.drawImage(canvas, 0, 0, 28, 28);
            
            // Get image data and invert
            const imageData = tempCtx.getImageData(0, 0, 28, 28);
            const data = imageData.data;
            
            // Convert to grayscale and invert
            const pixels = [];
            for (let i = 0; i < data.length; i += 4) {
                const gray = data[i]; // Since it's grayscale, R=G=B
                const inverted = 255 - gray;
                pixels.push(inverted / 255.0);
            }

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ pixels: pixels })
                });

                const result = await response.json();
                
                if (result.error) {
                    alert('Error: ' + result.error);
                    return;
                }

                const digit = result.digit;
                const confidence = result.confidence;
                const maxConf = Math.max(...confidence) * 100;

                // Display result
                resultDigit.textContent = digit;
                confidenceValue.textContent = maxConf.toFixed(1) + '%';
                resultConfidence.style.display = 'block';

                // Display probability grid
                probabilityGrid.innerHTML = '';
                confidence.forEach((prob, i) => {
                    const probItem = document.createElement('div');
                    probItem.className = 'prob-item' + (i === digit ? ' active' : '');
                    probItem.innerHTML = `
                        <div class="prob-digit">${i}</div>
                        <div class="prob-value">${(prob * 100).toFixed(0)}%</div>
                    `;
                    probabilityGrid.appendChild(probItem);
                });

            } catch (error) {
                console.error('Error:', error);
                alert('Failed to connect to server. Make sure Flask is running!');
            }

            loading.classList.remove('active');
        }
    </script>
</body>
</html>
